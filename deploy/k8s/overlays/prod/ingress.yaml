apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: andrej-karpathy-skills
  annotations:
    cert-manager.io/issuer: letsencrypt-dns-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: andrej-karpathy-skills-live-tls
      hosts:
        - andrej-karpathy-skills.lol
        - www.andrej-karpathy-skills.lol
  rules:
    - host: andrej-karpathy-skills.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: andrej-karpathy-skills
                port:
                  number: 80
    - host: www.andrej-karpathy-skills.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: andrej-karpathy-skills
                port:
                  number: 80
